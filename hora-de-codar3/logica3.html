<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lógica de Programação</title>
  </head>
  <body>
    <script>
      for (var i = 10; i >= 1; i--) {
        document.write(i + ", ");
      }

      //      while	         for
      //   mais manual	mais compacto
      //   mais passos	tudo em uma linha
    </script>
  </body>
</html>
