<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lógica de Programação</title>
  </head>
  <body>
    <script>
      let dentro = 0;
      let fora = 0;

      for (let i = 1; i <= 10; i++) {
        let valor = Number(prompt("Digite o valor " + i + ":"));

        if (valor >= 24 && valor <= 42) {
          dentro++;
        } else {
          fora++;
        }
      }

      alert("Valores dentro do intervalo: " + dentro);
      alert("Valores fora do intervalo: " + fora);
    </script>
  </body>
</html>
