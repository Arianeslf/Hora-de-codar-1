<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lógica de Programação</title>
  </head>
  <body>
    <script>
      alert("Bora um divisão? :)");

      var a = Number(prompt("Digite o 1 número:"));
      var b = Number(prompt("Digite o 2 número:"));

      while (b <= 0) {
        b = Number(prompt("Digite um número maior que zero:"));
      }

      var resultado = a / b;
      alert("O resultado da divisão foi " + resultado);
    </script>
  </body>
</html>
