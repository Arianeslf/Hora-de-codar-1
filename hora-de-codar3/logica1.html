<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lógica de Programação</title>
  </head>
  <body>
    <script>
      var inicio = 0;
      var final = 30;
      while (final >= inicio) {
        var resultado = final + "<br>";
        document.write(resultado);
        final--;
      }

      document.write("EXPLOSÃO");
    </script>
  </body>
</html>
