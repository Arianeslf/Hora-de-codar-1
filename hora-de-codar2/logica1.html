<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lógica de Programação</title>
  </head>
  <body>
    <script>
      let numero_first = prompt("Digite um número:");
      let numero_second = prompt("Digite um outro número:");
      if (numero_first > numero_second) {
        alert(
          "O número " + numero_first + " é maior que o número " + numero_second,
        );
      } else if (numero_second > numero_first) {
        alert(
          "O número " + numero_second + " é maior que o número " + numero_first,
        );
      } else {
        alert("Os dois números mencionados são iguais");
      }
    </script>
  </body>
</html>
