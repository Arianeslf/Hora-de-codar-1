<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lógica de Programação</title>
  </head>
  <body>
    <script>
      var a = Number(prompt("DIgite o 1 número:"));
      var b = Number(prompt("DIgite o 2 número:"));
      var c = Number(prompt("DIgite o 3 número:"));
      var d = Number(prompt("DIgite o 4 número:"));
      var e = Number(prompt("DIgite o 5 número:"));
      var f = Number(prompt("DIgite o 6 número:"));
      var soma = 0;
      if (a < 72) soma += a;
      if (b < 72) soma += b;
      if (c < 72) soma += c;
      if (d < 72) soma += d;
      if (e < 72) soma += e;
      if (f < 72) soma += f;

      alert(
        "O valor final de todos os número menores de 72 é " +
          soma +
          "\ne todos os números informados são: " +
          a +
          b +
          c +
          d +
          e +
          f,
      );
    </script>
  </body>
</html>
