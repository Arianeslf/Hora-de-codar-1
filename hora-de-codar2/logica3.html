<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lógica de Programação</title>
  </head>
  <body>
    <script>
      let a = Number(prompt("Digite o 1º valor:"));

      let b = Number(prompt("Digite o 2º valor:"));

      while (b === a) {
        b = Number(prompt("Valor repetido! Digite outro número:"));
      }
      let c = Number(prompt("Digite o 3º valor:"));

      while (c === a || c === b) {
        c = Number(prompt("Valor repetido! Digite outro número"));
      }

      if (a > b && a > c) {
        alert("o número " + a + " é o maior dos números digitados");
      } else if (b > a && b > c) {
        alert("o número " + b + " é o maior dos números digitados");
      } else {
        alert("o número " + c + " é o maior dos números digitados");
      }
    </script>
  </body>
</html>
