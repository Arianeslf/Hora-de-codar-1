<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lógica de Programação</title>
  </head>
  <body>
    <script>
      alert("Vamos somar média aritmética!\nÉ só digitar 6 números:");
      var a = Number(prompt("Digite o primeiro:"));
      var b = Number(prompt("Digite o segundo:"));
      var c = Number(prompt("Digite o terceiro:"));
      var d = Number(prompt("Digite o Quarto:"));
      var e = Number(prompt("Digite o Quinto:"));
      var f = Number(prompt("Digite o Sexto:"));
      var soma = (a + b + c + d + e + f) / 6;
      alert(
        "Os valores informados foram esses:\n" +
          a +
          ", " +
          b +
          ", " +
          c +
          ", " +
          d +
          ", " +
          e +
          ", " +
          f +
          "\nE a média aritmética é:\n" +
          soma,
      );
    </script>
  </body>
</html>
