<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lógica de Programação</title>
  </head>
  <body>
    <script>
      let numero = Number(
        prompt("Digite um número e deixe o programar ler ele:"),
      );
      if (numero < 0) {
        alert("O número informado é negativo");
      } else if (numero > 0) {
        alert("O número informado é positivo");
      } else {
        alert("Ele é igual a 0");
      }
    </script>
  </body>
</html>
